name: Module Blacklist Request / 模块黑名单申请
description: Submit a module to be added to the default blacklist / 提交模块加入默认黑名单
title: "[Blacklist]: "
labels: ["blacklist-request"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide the module ID and a sample so we can verify and add it to the blacklist.
        请提供模块 ID 和样本，我们会验证并将其加入黑名单。

  - type: input
    id: module_id
    attributes:
      label: Module ID / 模块 ID
      description: The unique module identifier (e.g., "example_module") / 模块的唯一标识符
      placeholder: example_module
    validations:
      required: true

  - type: input
    id: module_sample_url
    attributes:
      label: Module Sample URL / 模块样本链接
      description: A direct download link to the module .zip file (GitHub releases, etc.) / 模块 .zip 文件的直接下载链接
      placeholder: https://github.com/user/repo/releases/download/v1.0/module.zip
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Blacklisting / 黑名单原因
      description: |
        Why should this module be blacklisted? What issues does it cause?
        为什么要将此模块加入黑名单？它会导致什么问题？
      placeholder: |
        - e.g., Causes bootloop on devices with 5.15+ kernel
        - e.g., Incompatible with OverlayFS / Kasumi / Magic Mount
        - e.g., Self-mounts bypassing Hybrid Mount orchestration
    validations:
      required: true

  - type: textarea
    id: extra_info
    attributes:
      label: Additional Context / 补充信息 (optional)
      description: Any other relevant details (device model, kernel version, logs, etc.)
      placeholder: |
        - Device: Xiaomi 13, Android 14
        - Kernel: 5.15.100-android14
        - Logs: (link to relevant logs)
    validations:
      required: false
