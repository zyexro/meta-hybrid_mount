name: lints-check
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  checks: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lints-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      checks: write
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Format codes
        run: cargo fmt --all -- --check
      - name: Clippy code
        run: cargo clippy --all-targets -- -D warnings
      - name: Run unit tests
        run: cargo test --all-targets --workspace

  webui-lints:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v6
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /root/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate constants
        run: |
          cat <<'EOF' > src/lib/constants_gen.ts
          export const APP_VERSION = "dev";
          export const IS_RELEASE = false;
          export const RUST_PATHS = {
            CONFIG: "/data/adb/hybrid-mount/config.toml",
            DAEMON_STATE: "/data/adb/hybrid-mount/run/daemon_state.json",
            BINARY: "/data/adb/modules/hybrid_mount/hybrid-mount",
          } as const;
          EOF
          pnpm generate:info-tab-data
      - name: Run lint
        run: pnpm lint
      - name: Run test
        run: pnpm test
