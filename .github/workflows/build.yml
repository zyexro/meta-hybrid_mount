name: Build Hybrid-Mount

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - 'tools/notify/**'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - 'tools/notify/**'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  build-webui:
    needs: build-kasumi-lkm
    name: Build WebUI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'tree:0'

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve pnpm store path
        id: pnpm-store
        run: |
          set -euo pipefail
          STORE_PATH="$(pnpm store path --silent)"
          mkdir -p "$STORE_PATH"
          echo "path=$STORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build WebUI
        working-directory: webui
        run: |
          set -euo pipefail
          cat <<'EOF' > src/lib/constants_gen.ts
          export const APP_VERSION = "dev";
          export const IS_RELEASE = false;
          export const ENABLE_KASUMI = true;
          export const RUST_PATHS = {
            CONFIG: "/data/adb/hybrid-mount/config.toml",
            DAEMON_STATE: "/data/adb/hybrid-mount/run/daemon_state.json",
            BINARY: "/data/adb/modules/hybrid_mount/hybrid-mount",
          } as const;
          EOF
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload WebUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webui-dist
          path: module/webroot
          compression-level: 0
          if-no-files-found: error

  build:
    needs: [build-kasumi-lkm, build-webui]
    name: Build ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        flavor: [full, lite, nano]
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'tree:0'

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Download WebUI artifact
        if: matrix.flavor != 'nano'
        uses: actions/download-artifact@v8
        with:
          name: webui-dist
          path: module/webroot

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Build ${{ matrix.flavor }}
        env:
          HYBRID_MOUNT_NOTIFY: "0"
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
        run: |
          set -euo pipefail
          ls -la "$HYBRID_MOUNT_KASUMI_LKM_DIR" || true
          rm -rf output

          skip_flag=""
          if [ "${{ matrix.flavor }}" != "nano" ]; then
            skip_flag="--skip-webui"
          fi

          cargo xtask build --ci --flavor ${{ matrix.flavor }} $skip_flag

          ZIP_PATH="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$ZIP_PATH"
          ZIP_FILENAME="$(basename "$ZIP_PATH")"
          ARTIFACT_NAME="${ZIP_FILENAME%.*}"
          echo "ARTIFACT_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.flavor }} Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_ZIP }}
          compression-level: 0
          if-no-files-found: error

  notify:
    needs: build
    if: github.event_name != 'pull_request'
    name: Notify packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'tree:0'

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: notify-output
          pattern: Hybrid-Mount-*
          merge-multiple: true

      - name: Notify Telegram album
        env:
          HYBRID_MOUNT_NOTIFY: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          mapfile -t ZIP_FILES < <(find notify-output -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#ZIP_FILES[@]}" -ne 3 ]; then
            echo "Expected 3 package artifacts, found ${#ZIP_FILES[@]}:"
            find notify-output -maxdepth 2 -type f -print | sort
            exit 1
          fi
          cargo xtask notify \
            --output notify-output \
            --label "日常耕作 🌱 (Daily Tilling) [full+lite+nano] - ${{ github.ref_name }}" \
            --topic-id 37
