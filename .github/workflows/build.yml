name: Build Hybrid-Mount

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  build:
    needs: build-kasumi-lkm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /root/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build All
        env:
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
          HYBRID_MOUNT_NOTIFY: ${{ github.event_name != 'pull_request' && '1' || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ls -la "$HYBRID_MOUNT_KASUMI_LKM_DIR"
          cargo xtask build --ci

      - name: Detect Version and Name
        run: |
          set -euo pipefail
          mapfile -t ZIP_FILES < <(find output -maxdepth 1 -type f -name '*.zip' | sort)
          test "${#ZIP_FILES[@]}" -gt 0
          ZIP_PATH="${ZIP_FILES[0]}"
          ZIP_FILENAME=$(basename "$ZIP_PATH")
          ARTIFACT_NAME="${ZIP_FILENAME%.*}"
          VERSION="${ARTIFACT_NAME#Hybrid-Mount-}"
          
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Prepare Artifact
        run: |
          mkdir -p output/artifact_content
          unzip output/*.zip -d output/artifact_content
          rm output/*.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: output/artifact_content
