name: Build Full

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  build-full:
    needs: [build-kasumi-lkm]
    name: Build full
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/zyexro/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'tree:0'

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Build full
        env:
          HYBRID_MOUNT_NOTIFY: "0"
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
        run: |
          set -euo pipefail
          ls -la "$HYBRID_MOUNT_KASUMI_LKM_DIR" || true
          rm -rf output
          cargo xtask build --ci --flavor full

          ZIP_PATH="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$ZIP_PATH"
          ZIP_FILENAME="$(basename "$ZIP_PATH")"
          ARTIFACT_NAME="${ZIP_FILENAME%.*}"
          echo "ARTIFACT_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload full Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_ZIP }}
          compression-level: 0
          if-no-files-found: error
