name: Build Kasumi Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: "KMI version"
        required: true
        type: string
      arch:
        description: "Target architecture (DDK currently supports arm64 only)"
        required: true
        type: string
      kasumi_ref:
        description: "Kasumi git ref (branch/tag/commit)"
        required: false
        default: "main"
        type: string
      ddk_release:
        description: "DDK release version"
        required: false
        default: "20251104"
        type: string

jobs:
  build:
    name: Build kasumi ${{ inputs.arch }} ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    env:
      KMI: ${{ inputs.kmi }}
      TARGET_ARCH: ${{ inputs.arch }}
      OUT: ${{ github.workspace }}/out
      SRC_ROOT: ${{ github.workspace }}/kasumi_src
      SRC: ${{ github.workspace }}/kasumi_src/src

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: 'tree:0'

      - name: Validate target arch
        run: |
          if [ "$TARGET_ARCH" != "arm64" ]; then
            echo "DDK workflow currently supports arm64 only, got: $TARGET_ARCH"
            exit 1
          fi

      - name: Resolve Kasumi source
        id: kasumi_source
        run: |
          set -euo pipefail

          echo "Resolving Kasumi (ref: ${{ inputs.kasumi_ref }})..."
          rm -rf "$SRC_ROOT"
          git init "$SRC_ROOT"
          (
            cd "$SRC_ROOT"
            git remote add origin "https://github.com/Anatdx/Kasumi.git"
            git fetch --depth 1 origin "${{ inputs.kasumi_ref }}"
            git checkout FETCH_HEAD
            SHA="$(git rev-parse HEAD)"
            COMMIT_NUM="$(git rev-list --count HEAD)"
            VERSION="$((COMMIT_NUM + 200))"

            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Resolved Kasumi to $SHA"
          )
          ls -la "$SRC/"

      - name: Restore cached .ko
        id: cache-lkm
        uses: actions/cache@v5
        with:
          path: ${{ env.OUT }}
          key: kasumi-lkm-${{ runner.os }}-${{ env.KMI }}-${{ env.TARGET_ARCH }}-ddk-${{ inputs.ddk_release }}-kasumi-${{ steps.kasumi_source.outputs.sha }}-${{ hashFiles('.github/workflows/kasumi-lkm.yml') }}

      - name: Build kasumi_lkm.ko
        if: steps.cache-lkm.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/ylarod/ddk:${KMI}-${{ inputs.ddk_release }}"
          KASUMI_VERSION="${{ steps.kasumi_source.outputs.version }}"

          echo "Cache miss for ${KMI}_${TARGET_ARCH}_kasumi_lkm.ko"
          echo "Building with DDK image: $IMAGE"
          docker pull "$IMAGE"
          docker run --rm --privileged \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            -e KMI="$KMI" \
            -e TARGET_ARCH="$TARGET_ARCH" \
            -e OUT="$OUT" \
            -e SRC_ROOT="$SRC_ROOT" \
            -e SRC="$SRC" \
            -e KASUMI_VERSION="$KASUMI_VERSION" \
            "$IMAGE" \
            bash -lc '
              set -euo pipefail

              if [ -z "${KDIR:-}" ] || [ ! -f "$KDIR/Makefile" ]; then
                echo "KDIR is not available inside DDK container: ${KDIR:-<empty>}"
                exit 1
              fi

              echo "Building kasumi_lkm.ko with KDIR=$KDIR"
              (
                cd "$SRC_ROOT"
                make -j"$(nproc --all)" CC=clang \
                  CFLAGS_MODULE="-DKASUMI_VERSION=\\\"0.1.${KASUMI_VERSION}\\\""
              )

              mkdir -p "$OUT"
              KO_FILE="${KMI}_${TARGET_ARCH}_kasumi_lkm.ko"
              if [ -f "$SRC/kasumi_lkm.ko" ]; then
                BUILT_KO="$SRC/kasumi_lkm.ko"
              else
                mapfile -t BUILT_KOS < <(find "$SRC" -maxdepth 1 -type f -name "*.ko" | sort)
                if [ "${#BUILT_KOS[@]}" -ne 1 ]; then
                  echo "Expected exactly one built .ko under $SRC, found ${#BUILT_KOS[@]}:"
                  find "$SRC" -maxdepth 1 -type f -name "*.ko" -print | sort
                  exit 1
                fi
                BUILT_KO="${BUILT_KOS[0]}"
              fi

              echo "Staging built module: $BUILT_KO -> $OUT/$KO_FILE"
              cp "$BUILT_KO" "$OUT/$KO_FILE"
              llvm-strip -d "$OUT/$KO_FILE" 2>/dev/null || true
              ls -la "$OUT/"
            '

      - name: Verify .ko
        run: |
          set -euo pipefail
          KO_FILE="${OUT}/${KMI}_${TARGET_ARCH}_kasumi_lkm.ko"
          test -s "$KO_FILE"
          ls -la "$KO_FILE"

      - name: Report cache hit
        if: steps.cache-lkm.outputs.cache-hit == 'true'
        run: |
          echo "Using cached ${KMI}_${TARGET_ARCH}_kasumi_lkm.ko"

      - name: Upload .ko
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.KMI }}-${{ env.TARGET_ARCH }}-kasumi-lkm
          path: ${{ env.OUT }}/${{ env.KMI }}_${{ env.TARGET_ARCH }}_kasumi_lkm.ko
