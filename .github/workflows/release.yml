name: Release Hybrid-Mount

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  release:
    needs: build-kasumi-lkm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /root/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build Release Package
        env:
          HYBRID_MOUNT_SIGN_KEY: ${{ secrets.SIGNING_KEY }}
          HYBRID_MOUNT_SIGN_CERT: ${{ secrets.SIGNING_CERT }}
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
          HYBRID_MOUNT_NOTIFY: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cargo xtask build --release --tag ${{ github.ref_name }}

      - name: Prepare Release Metadata
        id: meta
        run: |
          set -euo pipefail
          mapfile -t ZIP_FILES < <(find output -maxdepth 1 -type f -name '*.zip' | sort)
          test "${#ZIP_FILES[@]}" -gt 0
          ZIP_PATH="${ZIP_FILES[0]}"
          ZIP_NAME=$(basename "$ZIP_PATH")
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          
          CLEAN_VERSION="${TAG#v}"
          VERSION_CODE=$(awk -F. '{printf "%d%02d%02d", $1, $2, $3}' <<< "$CLEAN_VERSION")
          
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$ZIP_NAME"
          CHANGELOG_URL="https://raw.githubusercontent.com/$REPO/main/changelog.md"
          
          cat <<EOF > /tmp/update.json
          {
            "version": "$TAG",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$DOWNLOAD_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF

      - name: Generate Changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release (Local)
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
          body_path: /tmp/changelog.md
          
      - name: Create Remote Release (KernelSU-Repo)
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: KernelSU-Modules-Repo/hybrid_mount
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
          body_path: /tmp/changelog.md

      - name: Sync Version to Main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git checkout main
          
          mv /tmp/update.json update.json
          cat /tmp/changelog.md | cat - changelog.md > temp && mv temp changelog.md

          cargo update
          
          git add update.json changelog.md Cargo.toml Cargo.lock
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): sync version ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
