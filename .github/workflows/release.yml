name: Release Hybrid-Mount

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  release:
    needs: build-kasumi-lkm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Resolve pnpm store path
        id: pnpm-store
        run: |
          set -euo pipefail
          STORE_PATH="$(pnpm store path --silent)"
          mkdir -p "$STORE_PATH"
          echo "path=$STORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Detect Release Type
        id: release_type
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          prerelease=true
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            patch="${version##*.}"
            if [[ "$patch" == "0" ]]; then
              prerelease=false
            fi
          fi
          if [[ "$prerelease" == "true" ]]; then
            release_type="pre-release"
          else
            release_type="release"
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"

      - name: Build Release Packages
        env:
          HYBRID_MOUNT_SIGN_KEY: ${{ secrets.SIGNING_KEY }}
          HYBRID_MOUNT_SIGN_CERT: ${{ secrets.SIGNING_CERT }}
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          build_package() {
            local flavor="$1"
            local notify="$2"
            rm -rf output
            HYBRID_MOUNT_NOTIFY="$notify" cargo xtask build --release --tag "${{ github.ref_name }}" --flavor "$flavor"
            local zip_path
            zip_path="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
            test -n "$zip_path"
            local zip_name
            zip_name="$(basename "$zip_path")"
            local staged_zip="/tmp/$zip_name"
            cp "$zip_path" "$staged_zip"
            if [ "$flavor" = "full" ]; then
              FULL_ZIP_NAME="$zip_name"
              FULL_ZIP_PATH="$staged_zip"
              echo "FULL_ZIP_NAME=$zip_name" >> "$GITHUB_ENV"
              echo "FULL_ZIP_PATH=$staged_zip" >> "$GITHUB_ENV"
            elif [ "$flavor" = "lite" ]; then
              LITE_ZIP_NAME="$zip_name"
              LITE_ZIP_PATH="$staged_zip"
              echo "LITE_ZIP_NAME=$zip_name" >> "$GITHUB_ENV"
              echo "LITE_ZIP_PATH=$staged_zip" >> "$GITHUB_ENV"
            else
              NANO_ZIP_NAME="$zip_name"
              NANO_ZIP_PATH="$staged_zip"
              echo "NANO_ZIP_NAME=$zip_name" >> "$GITHUB_ENV"
              echo "NANO_ZIP_PATH=$staged_zip" >> "$GITHUB_ENV"
            fi
          }

          build_package full 0
          build_package lite 0
          build_package nano 0

          NOTIFY_DIR="/tmp/hybrid-mount-release-notify"
          rm -rf "$NOTIFY_DIR"
          mkdir -p "$NOTIFY_DIR"
          cp "$FULL_ZIP_PATH" "$LITE_ZIP_PATH" "$NANO_ZIP_PATH" "$NOTIFY_DIR/"
          HYBRID_MOUNT_NOTIFY=1 cargo xtask notify \
            --output "$NOTIFY_DIR" \
            --label "丰收 (Harvest) [full+lite+nano] - ${{ github.ref_name }}" \
            --topic-id 6

      - name: Prepare Release Metadata
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          CLEAN_VERSION="${TAG#v}"
          VERSION_CODE=$(awk -F. '{printf "%d%02d%02d", $1, $2, $3}' <<< "$CLEAN_VERSION")

          FULL_ZIP_NAME="${FULL_ZIP_NAME}"
          LITE_ZIP_NAME="${LITE_ZIP_NAME}"
          NANO_ZIP_NAME="${NANO_ZIP_NAME}"
          FULL_DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$FULL_ZIP_NAME"
          LITE_DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$LITE_ZIP_NAME"
          NANO_DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$NANO_ZIP_NAME"
          CHANGELOG_URL="https://raw.githubusercontent.com/$REPO/main/changelog.md"

          cat <<EOF > /tmp/update.json
          {
            "version": "$TAG",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$FULL_DOWNLOAD_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF

          cat <<EOF > /tmp/update-lite.json
          {
            "version": "$TAG",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$LITE_DOWNLOAD_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF

          cat <<EOF > /tmp/update-nano.json
          {
            "version": "$TAG",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$NANO_DOWNLOAD_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF
      - name: Ensure jq for git-cliff
        run: |
          set -euo pipefail
          if command -v jq >/dev/null 2>&1; then
            jq --version
            exit 0
          fi
          apt-get update
          apt-get install -y --no-install-recommends jq
          rm -rf /var/lib/apt/lists/*
          jq --version

      - name: Generate Changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release (Local)
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          files: |
            ${{ env.FULL_ZIP_PATH }}
            ${{ env.LITE_ZIP_PATH }}
            ${{ env.NANO_ZIP_PATH }}
          body_path: /tmp/changelog.md

      - name: Create Remote Release (KernelSU-Repo)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          repo="KernelSU-Modules-Repo/hybrid_mount"
          tag="${{ github.ref_name }}"
          prerelease="${{ steps.release_type.outputs.prerelease }}"

          prerelease_flag=""
          if [[ "$prerelease" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" \
            --repo "$repo" \
            --draft \
            $prerelease_flag \
            --title "$tag" \
            --notes-file /tmp/changelog.md \
            ${{ env.FULL_ZIP_PATH }} \
            ${{ env.LITE_ZIP_PATH }} \
            ${{ env.NANO_ZIP_PATH }}

          gh release edit "$tag" \
            --repo "$repo" \
            --draft=false

      - name: Sync Version to Main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          mv /tmp/update.json update.json
          mv /tmp/update-lite.json update-lite.json
          mv /tmp/update-nano.json update-nano.json
          cat /tmp/changelog.md | cat - changelog.md > temp && mv temp changelog.md

          cargo update

          git add update.json update-lite.json update-nano.json changelog.md Cargo.toml Cargo.lock

          if ! git diff --staged --quiet; then
            git commit -m "chore(release): sync version ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
