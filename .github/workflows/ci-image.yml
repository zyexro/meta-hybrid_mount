name: Build CI Image

on:
  push:
    branches:
      - 'dev'
    paths:
      - '.github/docker/ci/Dockerfile'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  packages: write

env:
  CI_IMAGE: ghcr.io/hybrid-mount/meta-hybrid_mount-ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          filter: 'tree:0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/ci/Dockerfile
          push: true
          tags: |
            ${{ env.CI_IMAGE }}:latest
            ${{ env.CI_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=hybrid-mount-ci-image
          cache-to: type=gha,scope=hybrid-mount-ci-image,mode=max
